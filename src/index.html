<!DOCTYPE html>
<html lang="en">

    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <meta http-equiv="content-type" content="text/html; charset=UTF-8">

        <script src=
            "https://code.jquery.com/jquery-3.3.1.min.js">

        <script src=

        <link rel="stylesheet" href=
    "https://unpkg.com/jquery.terminal/css/jquery.terminal.min.css" />

    <body>
        <script>
            $('body').terminal({
                founder: function () {
                    this.echo('Samuel Runmark Thunell');
                },
                help: function () {
                    this.echo("founder: returns this sites founder\n"
                            + "gh3: redirects to a random picker for Guitar Hero III\n"
                            + "snake: redirects to a game of snake\n"
                            + "pong: redirects to a UNBEATABLE game of pong");
                },
                gh3: function () {
                    window.location.href = "https://gh3.smule.dev";
                },
                snake: function () {
                    window.location.href = "https://snake.smule.dev";
                },
                pong: function () {
                    window.location.href = "https://pong.smule.dev";
                }
            }, {
                greetings: 'WELCOME TO SMULE.DEV'
            });
        </script>
    </body>
